<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lisbon Travel Guide</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --ter:#1A5F6B;--ter-mid:#247A89;--ter-light:#C8E8ED;
  --gold:#C9961A;--gold-light:#FDF3D8;
  --cream:#FAF8F3;--white:#fff;
  --text:#1A1A1A;--text-mid:#555;--text-light:#888;
  --border:#E0DDD6;
  --serif:'Playfair Display',Georgia,serif;
  --sans:'Source Sans 3',sans-serif;
  --header-h:64px;--filter-h:50px;
}
.header-inner{display:flex;align-items:center}
html,body{height:100%;overflow:hidden;font-family:var(--sans);background:var(--cream);color:var(--text);font-size:14px}
.site-header{height:var(--header-h);background:var(--ter);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;position:relative;z-index:200}
.site-header h1{font-family:var(--serif);font-size:1.45rem;color:#fff;font-weight:700;white-space:nowrap}
.site-header p{color:#a8dde4;font-size:.78rem;margin-left:14px;display:flex;gap:10px;flex-wrap:wrap}
.back-btn{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-family:var(--sans);font-size:.75rem;font-weight:600;padding:6px 14px;border-radius:20px;text-decoration:none;transition:background .18s;white-space:nowrap}
.back-btn:hover{background:rgba(255,255,255,.22)}
.header-tag{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#c8eef2;font-size:.72rem;padding:3px 10px;border-radius:20px}
.filter-bar{height:var(--filter-h);background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 20px;position:relative;z-index:150;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.filter-label{font-size:.72rem;font-weight:600;color:var(--text-light);text-transform:uppercase;letter-spacing:.06em;margin-right:2px;white-space:nowrap}
.filter-btn{background:var(--white);border:1.5px solid var(--border);color:var(--text-mid);font-size:.76rem;padding:5px 12px;border-radius:20px;cursor:pointer;font-family:var(--sans);transition:all .18s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active{background:var(--ter);border-color:var(--ter);color:#fff}
.count-badge{background:var(--ter-light);color:var(--ter);font-size:.72rem;font-weight:600;padding:2px 9px;border-radius:10px;margin-left:auto;white-space:nowrap}
.layout{display:flex;height:calc(100vh - var(--header-h) - var(--filter-h));overflow:hidden}
.map-panel{width:42%;flex-shrink:0;position:relative;border-right:3px solid var(--gold)}
#map{width:100%;height:100%}
.cards-panel{flex:1;overflow-y:auto;padding:16px;background:var(--cream)}
.cards-panel::-webkit-scrollbar{width:6px}
.cards-panel::-webkit-scrollbar-track{background:#f0ede6}
.cards-panel::-webkit-scrollbar-thumb{background:#c0bbb0;border-radius:3px}
.places-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.place-card{background:var(--white);border-radius:10px;overflow:hidden;border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .18s,box-shadow .18s;display:flex;flex-direction:column}
.place-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.1)}
.place-card.hidden{display:none}
.place-card.highlighted{outline:3px solid var(--gold);outline-offset:0}
.slideshow{position:relative;height:190px;overflow:hidden;background:var(--ter);flex-shrink:0}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .4s ease}
.slide.active{opacity:1}
.slide img{width:100%;height:100%;object-fit:cover;display:block}
.slide-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.42);backdrop-filter:blur(3px);color:#fff;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .18s;line-height:1}
.slide-btn:hover{background:rgba(0,0,0,.7)}
.slide-prev{left:7px}.slide-next{right:7px}
.slide-dots{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;transition:background .18s}
.dot.active{background:#fff}
.cat-badge{position:absolute;top:9px;left:9px;background:rgba(26,95,107,.82);backdrop-filter:blur(4px);color:#c8eef2;font-size:.65rem;font-weight:600;padding:3px 8px;border-radius:14px;text-transform:uppercase;letter-spacing:.05em;z-index:10}
.daytrip-badge{background:rgba(201,150,26,.88);color:#fff}
.price-badge{position:absolute;bottom:26px;right:8px;background:rgba(0,0,0,.62);backdrop-filter:blur(3px);color:#fff;font-size:.72rem;font-weight:600;padding:4px 8px;border-radius:7px;z-index:10}
.price-free{color:#7de0a0}
.card-body{padding:12px 14px;display:flex;flex-direction:column;flex:1}
.card-title{font-family:var(--serif);font-size:1.15rem;font-weight:800;color:var(--ter);margin-bottom:1px;line-height:1.25}
.card-hint{font-size:.65rem;color:var(--text-light);margin-bottom:1px}
.card-category{font-size:.72rem;color:var(--text-light);margin-bottom:8px;font-style:italic}
.card-desc{font-size:.95rem;color:var(--text-mid);line-height:1.6;margin-bottom:10px}
.details-toggle{display:flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--ter-light);color:var(--ter-mid);font-size:.75rem;font-weight:600;padding:5px 11px;border-radius:6px;cursor:pointer;font-family:var(--sans);transition:all .18s;width:100%;justify-content:center;margin-top:auto}
.details-toggle:hover{background:var(--ter);color:#fff;border-color:var(--ter)}
.details-toggle .arrow{transition:transform .25s;display:inline-block}
.details-toggle.open .arrow{transform:rotate(180deg)}
.details-body{display:none;border-top:1px solid var(--border);margin-top:10px;padding-top:10px}
.details-body.open{display:block}
.info-row{display:grid;grid-template-columns:90px 1fr;border-bottom:1px solid #F0EDE6;padding:5px 0;gap:4px}
.info-row:last-child{border-bottom:none;padding-bottom:0}
.info-label{font-size:.68rem;font-weight:600;color:var(--ter);text-transform:uppercase;letter-spacing:.04em;padding-top:1px;line-height:1.4}
.info-value{font-size:.76rem;color:var(--text);line-height:1.45}
.info-row.tip{background:var(--gold-light);border-radius:5px;padding:6px 8px;margin-top:4px;border-bottom:none;grid-template-columns:72px 1fr}
.info-row.tip .info-label{color:var(--gold)}
.info-row.may{background:#EDF7ED;border-radius:5px;padding:6px 8px;margin-top:4px;border-bottom:none;grid-template-columns:72px 1fr}
.info-row.may .info-label{color:#2E6B3E}
.map-legend{position:absolute;bottom:12px;left:10px;z-index:1000;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:.72rem;box-shadow:0 2px 8px rgba(0,0,0,.12)}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.legend-item:last-child{margin-bottom:0}
.legend-dot{width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.3);flex-shrink:0}
@media(max-width:900px){html,body{overflow:auto;height:auto}.layout{flex-direction:column;height:auto;overflow:visible}.map-panel{width:100%;height:320px;border-right:none;border-bottom:3px solid var(--gold)}.places-grid{grid-template-columns:1fr}.site-header p{display:none}.card-hint{display:none}}
</style>
</head>

  {id:6,name:"Miradouro da Graça",emoji:"🌅",cat:"Scenic Viewpoint · Graça Neighbourhood",tag:"viewpoint",priceLabel:"Free",free:true,
  lat:38.7172,lng:-9.1296,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNGDeVbyUjrvABxT14ZjcsBqrHx68E4K841DzVpJ3aGrfd3eiqE8wYbPBnUnuKS7AhG90FZMboG6g6O5s_RCYkfbCJX4UzTFRTYAm1Wu0ybLNvVJIIvid-MkiK4x4vN1FTye9VekW-A-h1Z57qs=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGOPY1hcpMghWcSkpfcIEyAv7VRaFuumqP51Hu9s0ycMq7slS_B5SgbM9KzvSOW4D5ivcY2PSbmzarca_P2P8iyDb0rxONjinAd8Tdn3VuVmgw5kTBUDcb_g7jVvIv4yEImDbmhWwLBg8xGig=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNHwRHkOta9Wz1fXqdrqOiyKFYQzg-j1-2jajMLRtvzsPH_6e8MQ1JK31pZcm4K34Ggt8YQbM5Sky8-wK4D26PmkeiQ6kS3UnNjUkAVF9fPDMRzDxlLBrafjyEkaVvsEhjJQDzkxxPuTw85mBQ=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGzNYhZYnSBAh8bYnHsvrPJV4giulI86Bd65jKxhOaR90e2vUw6043RNrqYOMMzClEPzN_4jXdZJ7QGIydVjW7DjWIdsjBLWlHhOxGttIf77CxD_C5Z81H6E_4JgJdhDZ9fMtaweruWUYgNCQ=s800-w800-h500"],
  desc:"The locals' favourite viewpoint — a 180° panorama taking in the castle, the 25 de Abril Bridge, and the full sweep of the Tagus. Less overrun than other miradouros. The terrace kiosk sells wine by the glass for €2.50.",
  distance:"1 km from Alfama · Bus 734 or uphill walk",transport:"Bus 734 from Martim Moniz · Walk uphill from Alfama (15 min)",cost:"Free",time:"30–45 minutes",
  tip:"Arrive by 8pm to claim a bench for sunset (around 9pm in late May). No tuk-tuks or selfie-stick vendors — the crowd here is mostly locals.",may:"Golden hour falls around 8:30pm in late May. The light across the Tagus from this direction is extraordinary. One of the best free experiences in Lisbon."},

  {id:7,name:"Miradouro de Santa Catarina",emoji:"🗿",cat:"Scenic Viewpoint (Adamastor) · Bica",tag:"viewpoint",priceLabel:"Free",free:true,
  lat:38.7085,lng:-9.1487,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNHvWjG31fa2Dw8uDzw8Jk3DlvhfQ42tHI70rdGrQ_6QX7XMz9LijT3vbeyo3e3q6XfakQ4IfwuvwnxmL270lJ_ZttBKZFEKJLfgVkkUVB0RrQj31kjnpmz0z_w2GOLBcuyRvUoL_nFTNWc0QAI=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNEuqObHAhQmXE0NlNYYl83353sYih6YntY6cg-A5JXgVKs-m5jMypazJSOmqz6ksfOEGUnsR8A73jeg230KDFlWQS48sgETnV4StGdF6Qks4cD-TDrjRaqr-Wlf3_GMWEwav_WZrW3KiwD__w=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNHpcaa_TV5PpznGi3I_xyJMkqfSL9scO007yO2EyXhqOHSLquEqSUR6fjSgIqH9zNQvJ4Ax7vQ2AQose543wrH5rYhRCOdStcYAVNWHr_vdBIIZdf6hJGKN9v4N40_TJLyvj-utu_dnB6YH1Q=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGmpZdXVhDWCyvoCDgGzIpjR1LgFXSoir36uS_FnX73qEvwh0TuGYEkqS5YOHpVONzI9rYUZwv59dYQDI_EyjHpt93w3Nl0p9b4wJ845w7AW3LcG5eNK2wACG_FfWBNeqGh0lLwJHTnMn4P3vE=s800-w800-h500"],
  desc:"A west-facing terrace over the river mouth and the 25 de Abril Bridge, presided over by the mythological Adamastor statue. The most bohemian viewpoint in the city — musicians, students, and older locals gather here for afternoon and evening light.",
  distance:"Bica/Bairro Alto area · Walk or Bica Funicular",transport:"Bica Funicular (€4) from Rua de São Paulo · 10-min walk from Chiado",cost:"Free · Bica Funicular: €4 (covered by Viva Viagem 24hr pass)",time:"30–60 minutes",
  tip:"The Bica Funicular is worth riding for the experience alone — 3 minutes through the Bairro Alto neighbourhood. Best miradouro in the city for watching the sun set over the Tagus.",may:"Sunset here at around 9pm is one of the defining Lisbon experiences. The terrace fills from 7pm — arrive slightly earlier."},

  {id:8,name:"Miradouro do Parque Eduardo VII",emoji:"🌿",cat:"Scenic Viewpoint · City Centre",tag:"viewpoint",priceLabel:"Free / €3.50 greenhouses",free:true,
  lat:38.7253,lng:-9.1525,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNESXUpiPip1lY78dRMqjP734j0ma4Ule8Zko9FyLs_vM4Yssegan6YuLSSckGKM6Jo-GPNSuSnxRXLqiqYkZzHO8rUTEHpIWkuRWDU3nCzlyvq3btyhmpYXn9d-fx2UuHD5fKaE3XuMpbQkUgI=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNFbT6qvf8y_u4vKIXvCe3HqnvgzlqZ0YnK6bf2va6xSPiplNQbyfv7Gz7j5Q3_vf6hk7k68Idd5nH_IWB9uh5hyJ7Cseji9M6O0zw2KESyZxxVBmhuVDusSfKAaUAg6T32_0eimBeA0gyObWlo=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGZgMWQmE6z1gs1BfEdl6V9oGB0EcDpc7v8LMWcCm_ful0gVjdD2Rh6QiiiEIjWOcDKo4nlcLmQxXy2VlfC1jVl7vW2cGV-c5c28ENq_ECj11NNypZX7HUdYoYAqk-P6ZDQ5kSFDpH6lLOFFLw=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNH1Y1mFURMfmvxom0jYUvB1nx69h6QvmMsW7NMqiJ7ZFTPFLycnMIXaBxJQvR4953sWLCk-EVKO7HcCn2CmoXWjjdLRj_9KFAWwsh3wzJmTfwKUaz3cxLrww9qkqhl9T8_Ym_enYP4KZ-BOExfhinxC=s800-w800-h500"],
  desc:"The top of Lisbon's main formal park frames one of the city's best-composed views — the Avenida da Liberdade running dead-straight down to the Tagus, with the castle visible on the hill. The Estufa Fria greenhouses inside the park are a hidden gem: tropical plants in a shaded ravine.",
  distance:"City centre · Metro: Marquês de Pombal or Parque",transport:"Metro Blue/Yellow Line to Marquês de Pombal or Parque",cost:"Park: Free · Estufa Fria greenhouses: ~€3.50",time:"20–30 minutes",
  tip:"The Estufa Fria (€3.50) is a canyon of ferns, palms, and lily ponds under a slatted shade structure — one of Lisbon's most photogenic and least-known spots. The rose garden is directly below.",may:"The rose garden is in full bloom in late May. Peaceful on weekday mornings before the tourist coaches arrive."},

  {id:9,name:"Fado ao Vivo (Live Fado)",emoji:"🎵",cat:"UNESCO Music Experience · Alfama & Mouraria",tag:"experience",priceLabel:"€10–25 cover",free:false,
  lat:38.7104,lng:-9.1359,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNE9BTx7JRj5bjdoys7VHcmMrF5AnX1NtI3-HhMYTSh8YLK2n0qwFUA6_Z8aC4bcyaoJ_vfr_z6-5bQYGaMm5uhkbJpsBKXbu964bRuMMgYUDK7nQn8eEoEF0OAL2RPHbEBQt9NXBCQ9WjCPLA=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNHPBUZn-hINGbIcDi9Bsc2uZQ8JNiMFc1Hiz5EhxTtBsvFvbCYvflNlWg_kFKM-9Mygjcx5IA6dGpodvwCQcJ9_pG_xrWdYkcEQ2bMJNJboIqRPOWbil-8XMt3HgQNALIQK6D1Kd0yIkpIDbQQ=s800-w720-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNG6koDgJEaF1yvYcFW1138CK24kLxgQLKSMxxdTBZpWNBlzBkPA8qlGrgUdxKVCsWrD0u65aBZjgb819gL1M6zSHpzqOS8g-xwDWHlfEYXS1kcnZ7U_-TebCC4qxqi4evtcXQAeh_BqMNyIbI2n2hNSIA=s800-w800-h500"],
  desc:"Portugal's UNESCO-listed national music — mournful and intimate, built on saudade (the untranslatable concept of longing). The genuine article is a guitarist, a bassist, and a singer in a room of 30 people. Avoid anything with a set-menu price and minimum spend.",
  distance:"Alfama and Mouraria · Evening shows from 8–9pm",transport:"Tram 28E or walk from city centre",cost:"€10–25 cover charge (often includes a drink)",time:"2–3 hours",
  tip:"Best authentic venues: Tasca do Chico (Mouraria, max 20 people — book weeks ahead), Mesa de Frades (Alfama, in a former chapel), and Zé da Viola (Mouraria, more low-key). Arrive early and plan to stay.",may:"Warm May evenings make the walk to these venues feel festive. The Santo António energy in Mouraria adds to the atmosphere."},

  {id:10,name:"Vintage Trams & Funiculars",emoji:"🚋",cat:"Iconic City Transport · City-wide",tag:"experience",priceLabel:"€4 / covered by Viva Viagem pass",free:false,
  lat:38.7096,lng:-9.1404,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNF4FF_U6lL1h23pxzeA3jKANbz1AtchHhzRbOmiZyLp6MPM1PttWzXB7gWNpm2VBQ0LaKnrQhfK7o9047V7d2o8i1YhejJdBqfySfK8LRUMWaLyV33m07QImni4u0aLV0pqEi2zBMcssGM0_Q=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGAh7vJncdAAYRAPZpGsChOZUpzv4Cfj2JDMKssjAXG9Z-5T3G5GtUBvHHQWc6BsncpqBaF4cyaK1wqrQ29HEWstYSsXWV0wblB8e5sbYNliQlOiS-WcIONMvETBNLHHPEQujRutvCMWebw8A=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGLJ7myUSn8FOvG7MjU4kZKwMybXmqQzMCMCgPOJoKYnrIUcJhGfqXAJwsXfMpLst2S3rTQXQXsrw18gC40-gugmzR97Xe6AhkpWFbmBWJZB5QOXqMh79xfG7cTHO-KMttnczn1W-ECj25R17g=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNHSwRFTIH09Z4ookAW5TmHrp_yALrPnsV-6shk8ftE1ad4oTkbZHHCwIko-Ezm47FxziLfQ3eaw-H7yrHmcrI6rMmpQzHGFW4OwaosDT8c5PpAfjMvQyDB05Zcm7Mi7AE2wdnZCsctGHVFT=s800-w800-h500"],
  desc:"Lisbon's vintage yellow trams are still the most practical way to navigate the steepest hills. Tram 28 is the famous route; the three funiculars (Bica, Glória, Lavra) each offer their own urban perspective. The Bica funicular through Bairro Alto feels like a film set.",
  distance:"City-wide · Various routes",transport:"Buy Viva Viagem 24hr pass (€6.80) at any metro station — covers all trams, funiculars, buses, and metro",cost:"€4 per ride · Viva Viagem 24hr pass: €6.80 (unlimited)",time:"30 minutes per ride",
  tip:"Ride Tram 28 before 9am if you want a seat. The Lavra funicular (1884) is the oldest and quietest. The Viva Viagem 24hr pass almost always pays for itself by the end of a day.",may:"Late May is warm enough to ride with the windows down — do this on the Bica funicular."},

  {id:11,name:"Elevador de Santa Justa",emoji:"⚙️",cat:"Neo-Gothic Lift & Viewpoint · Baixa",tag:"experience",priceLabel:"€6 / €2.50 platform only",free:false,
  lat:38.7121,lng:-9.1396,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNHlURwRQ2zc7Ourr_y7RUJztDCVCSRylvmtTk-T0KvRR3t3dq6cMJXGoYy7YZSLeimqX849qrxua4TQ8SrhKo7AtIfFg8HtTFN5tOiDisDztgvbDNqkbuLoFVLnkt2uKT6PYGUXvDdMy9he5B4=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGjdC04e2nPh-j43a9cxw0PjVDXHiyoFrcN0oOxd4eN9_7yOwenGkRSaHgx9JOYiG0G7xUSq2d9-c0Mr-hNSy9RrEmCDptkq6WR2X_8FFCvIWtLa5Jw9JO7NFx4w81Lb_NSaYksilvs2dvTvg=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNE0nJpTHFlxbFBVAIgASCKUvVuZycahtNKkOqhz0RtHZgycs-bfoBzN0VROk1-mIalVny9LZ776Cx2AAl4YSkVW3bKj2hg2q5pdOM43_S78xLCJV8VPHXym_6esFr2UpGfHcIbuqG0qHtbjYu4=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNH2fcKCIzCdNI7M8vkfcfhxw0bnG0h-3K9LwwO9iI1j9BBlmqDIgqvqweOAg-Y6MiTrvM8z89gQv_I4jZO0VyVVtsySH565zzk6nsVKpVxfRXSiKpbyu943pqn61iez3vDsVF0v0LkJnU51AA=s800-w800-h500"],
  desc:"A cast-iron Neo-Gothic elevator designed by a student of Gustave Eiffel, opened 1902. It lifts passengers 45 metres from Baixa to the Bairro Alto, with rooftop views across the Tagus. The Convento do Carmo — Gothic ruins open to the sky since the 1755 earthquake — is directly beside it.",
  distance:"City centre · Baixa · 3-min walk from Rossio",transport:"Walk from Rossio Square · Metro Blue/Green Line to Baixa-Chiado",cost:"Lift: €6 · Platform only (from Largo do Carmo): €2.50 · Convento do Carmo: €5",time:"30 minutes",
  tip:"Skip the lift queue — walk up to Largo do Carmo from the Chiado side and access the platform for €2.50. The Convento do Carmo ruins next door are equally unmissable for €5.",may:"The platform at sunset (around 9pm) with light on the Tagus is beautiful. The Carmo ruins are particularly atmospheric in late afternoon."},,,,,

  {id:16,name:"Surf Lessons — Cascais or Caparica",emoji:"🏄",cat:"Surf School · Atlantic Coast",tag:"outdoor",priceLabel:"€35–50 group lesson",free:false,
  lat:38.6979,lng:-9.4215,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNFyjQcxkVyejLi-oy0UJpAaya_IW-8WKxGJf_87nMRptjPiEuDgPXRuI_CiUAGMZVxzV1Mpwr8vnlnCDI7Eg9mJXx0ncb-Mv5GlTnJSOFokWwqs2EZaPGyxxOE684_3nPoRrR0apTeKKNLz=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNEmQE_rY_M0weAOc0ZOMuYmIvRhcuE-EQV8sR_s7uRmsPRUIDOcCVWRBZfVsaE4MCpFaWTOY9FTb39MofDI3pLVefsBlc9yVMFHpRFmQwDU6PfpDAWEa44NjbkYrDY70jDnjF7y91uAK2_g-so=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGDPu7Q2ITsiNsKchzTDB7oVXAoaTMZWEzhxtj3VTd5_MegK1o7K1gMIpo5GLXXCzuLOtDstlm-aNl3YfAWtXYlEZhZauZiLhoApk7waQ4i_OtvC0vCmu9yv8A2v1yt4kKS1O8ncmR-chEzlRw=s800-w720-h478","https://lh3.googleusercontent.com/place-photos/AL8-SNEWP5ob7dxDD8OBPmx5_7pa_dHFEaE57drQCBos1YM-Y7rxr6JPVMJNKQTt8DsMRqOEt0fSUl5WoVfuCzrDW3UzM31HyRcRqYAWPtVjIXmclATsQrmG0bZ-1Z_bTB46n4LO5QfF2ti4kUIp=s800-w800-h500"],
  desc:"Some of the most accessible beginner surf in Europe — within 45 minutes of Lisbon. Consistent smaller swells, water around 18–19°C in late May, and well-equipped surf schools at both Cascais (easier by train) and Costa da Caparica (bigger beach, local scene).",
  distance:"Cascais: 35 min by direct train · Caparica: 45 min by bus + ferry",transport:"Cascais: direct train from Cais do Sodré · Caparica: Tram 15E + ferry from Belém",cost:"€35–50 for 2-hour group lesson with board and wetsuit",time:"Half day",
  tip:"Book the morning lesson to leave the afternoon free for the beach. Cascais Surf School is right on the train line — simplest logistics. Caparica has better waves and a more authentic local atmosphere.",may:"Smaller crowds than summer with 9pm sunsets meaning a full afternoon at the beach after a morning lesson. Water at 18–19°C — cold but manageable in a wetsuit."},

  {id:17,name:"Tagus Estuary Kayaking / SUP",emoji:"🚣",cat:"Water Activity · Belém Waterfront",tag:"outdoor",priceLabel:"€35–50 guided tour",free:false,
  lat:38.6940,lng:-9.2035,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNFlJ6fsmkH9p1Da-yE33LSlUipbqJIm7Kv60LgTnR8xA5_Kw4F8cZ5jt9ee_S0ImX1_L2BmpZujIoNaiUAcHKRJUiDw6jor3NDA5tjCJc_DgsSBfpAIwBPKnsvLOh8ynD8zInY_xK26wy0SDw=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGOi7-3-SWye5DuhiYlpoVDEMJgRvz70cH4mRhPAHg-JMk_8L2sESPaHa-EPbmcF4-C3EY8xFChVbGJrNJp7ELSSpmxw1fwn1uS5-YN0qe13sxoODIg0aX_DAf0MSmm_ksTNot2jkZKU_ziLQ=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNH1oPDLz7fo2eYB5gSy8F9XM9n3HapzYQqcd9s5528TaTgLGS9Gw4BwEvCfkrkRI7afhUppF1VJFDLP8YqRoCxs-HSpiopXNtj7s7xKAM-OX0KhGVrIq38yxQyoFOGWoNEL_b4hRbJYuXEq484LLVXUUQ=s800-w800-h500"],
  desc:"Paddling across the vast Tagus estuary with the 25 de Abril Bridge and Belém Tower as backdrops — one of the most photogenic outdoor experiences available from any major European capital. Guided kayak and SUP tours run from the Belém waterfront.",
  distance:"Belém waterfront · Tour operators on-site",transport:"Tram 15E to Belém · Operators signposted from the waterfront",cost:"€35–50 for a 2-hour guided tour",time:"2–3 hours",
  tip:"Early morning tours offer the flattest, glassiest water. Sunset tours are also popular. Book online in spring as spots fill quickly.",may:"Late May sweet spot — warm air (22–26°C), calm mornings on the estuary, and extraordinary sunsets from the water."},

  {id:18,name:"Arrábida Natural Park",emoji:"🏖️",cat:"Coastal Nature Reserve · Day Trip South",tag:"outdoor",priceLabel:"€5–10 park entry",free:false,
  lat:38.4897,lng:-8.9741,
  photos:["https://lh3.googleusercontent.com/place-photos/AL8-SNFyjQcxkVyejLi-oy0UJpAaya_IW-8WKxGJf_87nMRptjPiEuDgPXRuI_CiUAGMZVxzV1Mpwr8vnlnCDI7Eg9mJXx0ncb-Mv5GlTnJSOFokWwqs2EZaPGyxxOE684_3nPoRrR0apTeKKNLz=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNEmQE_rY_M0weAOc0ZOMuYmIvRhcuE-EQV8sR_s7uRmsPRUIDOcCVWRBZfVsaE4MCpFaWTOY9FTb39MofDI3pLVefsBlc9yVMFHpRFmQwDU6PfpDAWEa44NjbkYrDY70jDnjF7y91uAK2_g-so=s800-w800-h500","https://lh3.googleusercontent.com/place-photos/AL8-SNGDPu7Q2ITsiNsKchzTDB7oVXAoaTMZWEzhxtj3VTd5_MegK1o7K1gMIpo5GLXXCzuLOtDstlm-aNl3YfAWtXYlEZhZauZiLhoApk7waQ4i_OtvC0vCmu9yv8A2v1yt4kKS1O8ncmR-chEzlRw=s800-w720-h478","https://lh3.googleusercontent.com/place-photos/AL8-SNEWP5ob7dxDD8OBPmx5_7pa_dHFEaE57drQCBos1YM-Y7rxr6JPVMJNKQTt8DsMRqOEt0fSUl5WoVfuCzrDW3UzM31HyRcRqYAWPtVjIXmclATsQrmG0bZ-1Z_bTB46n4LO5QfF2ti4kUIp=s800-w800-h500"],
  desc:"A limestone mountain range dropping into some of the cleanest Atlantic water in Europe — turquoise coves, white pebble beaches, and pine-covered cliffs just 40 minutes from Lisbon. Portinho da Arrábida and Praia de Galapinhos feel genuinely remote despite the proximity to the capital.",
  distance:"40 km south · ~40 min by car",transport:"Car rental recommended · Guided tours from Lisbon with optional winery stop · Bus to Setúbal then local connections",cost:"Park entry: ~€5–10 · Guided half-day tour: ~€35",time:"Full day",
  tip:"A car makes logistics much easier. Guided tours often include a winery stop — the Setúbal Peninsula produces excellent Moscatel. Swimming is possible from late May onwards.",may:"One of the best times to visit — water around 19–20°C (warmer than Cascais), beaches not yet full, wildflowers on the limestone slopes."},

    {id:19,name:"Palácio Nacional de Sintra",emoji:"🏛️",cat:"National Palace · Sintra Town Centre",tag:"sintra",priceLabel:"€10 adults",free:false,

// ── SLIDESHOW STATE ───────────────────────────────────────────────────────────
const ssState = {};
P.forEach(p => ssState[p.id] = { cur: 0, total: p.photos.length });

function goSlide(id, idx) {
  const ss = document.getElementById('ss-' + id);
  if (!ss) return;
  const slides = ss.querySelectorAll('.slide');
  const dots = ss.querySelectorAll('.dot');
  slides[ssState[id].cur].classList.remove('active');
  dots[ssState[id].cur] && dots[ssState[id].cur].classList.remove('active');
  ssState[id].cur = idx;
  slides[idx].classList.add('active');
  dots[idx] && dots[idx].classList.add('active');
}
function changeSlide(id, dir) {
  const s = ssState[id];
  goSlide(id, (s.cur + dir + s.total) % s.total);
}

function toggleDetails(id) {
  const btn = document.getElementById('dtbtn-' + id);
  const body = document.getElementById('dtbody-' + id);
  const open = body.classList.toggle('open');
  btn.classList.toggle('open', open);
  btn.querySelector('.arrow').textContent = open ? '▲' : '▼';
  btn.querySelector('.label').textContent = open ? 'Less details' : 'More details';
}

function priceBadge(p) {
  const isFree = p.priceLabel.startsWith('Free') && !p.priceLabel.includes('/');
  const color = isFree ? '#7de0a0' : '#fff';
  return `<span style="color:${color}">${p.priceLabel}</span>`;
}

const grid = document.getElementById('places-grid');
P.forEach(p => {
  const isDay = p.tag === 'daytrip';
  const slides = p.photos.map((url, i) =>
    `<div class="slide${i === 0 ? ' active' : ''}"><img src="${url}" alt="" loading="${i === 0 ? 'eager' : 'lazy'}" onerror="this.style.display='none'"></div>`
  ).join('');
  const dots = p.photos.map((_, i) =>
    `<span class="dot${i === 0 ? ' active' : ''}" onclick="goSlide(${p.id},${i})"></span>`
  ).join('');

  const card = document.createElement('div');
  card.className = 'place-card';
  card.dataset.tag = p.tag;
  card.dataset.free = p.free ? 'true' : 'false';
  card.id = 'card-' + p.id;
  card.innerHTML = `
    <div style="position:relative">
      <div class="slideshow" id="ss-${p.id}">
        ${slides}
        ${p.photos.length > 1 ? `
        <button class="slide-btn slide-prev" onclick="changeSlide(${p.id},-1)">&#8249;</button>
        <button class="slide-btn slide-next" onclick="changeSlide(${p.id},1)">&#8250;</button>
        <div class="slide-dots">${dots}</div>` : ''}
      </div>
      <span class="cat-badge${isDay ? ' daytrip-badge' : ''}">${isDay ? '🚌 Day Trip' : p.cat.split('·')[0].trim()}</span>
      <div class="price-badge">${priceBadge(p)}</div>
    </div>
    <div class="card-body">
      <div class="card-title">${p.emoji} ${p.name}</div>
      <div class="card-hint">🗺️ Click card to locate on map</div>
      <div class="card-category">${p.cat}</div>
      <div class="card-desc">${p.desc}</div>
      <button class="details-toggle" id="dtbtn-${p.id}" onclick="toggleDetails(${p.id})">
        <span class="label">More details</span> <span class="arrow">▼</span>
      </button>
      <div class="details-body" id="dtbody-${p.id}">
        <div class="info-row"><span class="info-label">📍 Distance</span><span class="info-value">${p.distance}</span></div>
        <div class="info-row"><span class="info-label">🚋 Getting There</span><span class="info-value">${p.transport}</span></div>
        <div class="info-row"><span class="info-label">💶 Entry</span><span class="info-value">${p.cost}</span></div>
        <div class="info-row"><span class="info-label">🕒 Time</span><span class="info-value">${p.time}</span></div>
        <div class="info-row tip"><span class="info-label">💡 Tip</span><span class="info-value">${p.tip}</span></div>
        <div class="info-row may"><span class="info-label">🌸 Late May</span><span class="info-value">${p.may}</span></div>
      </div>
    </div>`;
  grid.appendChild(card);

  card.style.cursor = 'pointer';
  card.addEventListener('click', function(e) {
    if (e.target.closest('.slide-btn') || e.target.closest('.dot') || e.target.closest('.details-toggle') || e.target.closest('a')) return;
    map.flyTo([p.lat, p.lng], p.tag === 'daytrip' ? 11 : 15, {duration: 1.0});
    setTimeout(() => markers[p.id].openPopup(), 1100);
    document.querySelectorAll('.place-card').forEach(c => c.classList.remove('highlighted'));
    card.classList.add('highlighted');
    setTimeout(() => card.classList.remove('highlighted'), 2500);
  });
});

const map = L.map('map').setView([38.717, -9.142], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom: 19
}).addTo(map);

const tagColors = {
  sintra: '#7B3F00',
  landmark: '#1A5F6B', viewpoint: '#4A6B8A', experience: '#5C3317',
  food: '#6B2060', outdoor: '#2E6B3E', daytrip: '#1a4a1a'
};
const markers = {};

P.forEach(p => {
  const color = tagColors[p.tag] || '#1A5F6B';
  const icon = L.divIcon({
    className: '',
    html: `<div style="background:${color};color:#fff;border:2.5px solid #fff;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,.45);cursor:pointer">${p.emoji}</div>`,
    iconSize: [34, 34], iconAnchor: [17, 17], popupAnchor: [0, -20]
  });
  const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
  m.bindPopup(`
    <div style="font-family:sans-serif;min-width:190px">
      <strong style="font-size:.92rem">${p.emoji} ${p.name}</strong><br>
      <span style="font-size:.78rem;color:#666;font-style:italic">${p.cat}</span><br>
      <span style="font-size:.78rem;color:#555;margin-top:2px;display:block">${p.priceLabel}</span>
      <a href="#card-${p.id}" onclick="scrollToCard(${p.id})" style="display:inline-block;margin-top:6px;font-size:.78rem;color:#1A5F6B;font-weight:600;text-decoration:none;border:1px solid #C8E8ED;padding:3px 9px;border-radius:5px">View card ↓</a>
    </div>`);
  markers[p.id] = m;
});

function scrollToCard(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  const panel = document.getElementById('cards-panel');
  panel.scrollTo({ top: card.offsetTop - panel.offsetTop - 10, behavior: 'smooth' });
  document.querySelectorAll('.place-card').forEach(c => c.classList.remove('highlighted'));
  card.classList.add('highlighted');
  setTimeout(() => card.classList.remove('highlighted'), 2500);
}

function filterCards(tag, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let count = 0;
  document.querySelectorAll('.place-card').forEach(c => {
    let show;
    if (tag === 'all') show = true;
    else if (tag === 'free') show = c.dataset.free === 'true';
    else show = c.dataset.tag === tag;
    c.classList.toggle('hidden', !show);
    if (show) count++;
  });
  document.getElementById('count-badge').textContent = count + ' place' + (count === 1 ? '' : 's');
  P.forEach(p => {
    let show;
    if (tag === 'all') show = true;
    else if (tag === 'free') show = p.free === true;
    else show = p.tag === tag;
    if (show) { if (!map.hasLayer(markers[p.id])) markers[p.id].addTo(map); }
    else { if (map.hasLayer(markers[p.id])) markers[p.id].remove(); }
  });
}
</script>
